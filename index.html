<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | Профессиональный Апгрейд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0b0b] text-white font-['Montserrat']">

    <nav class="flex justify-between items-center px-8 py-6 border-b border-white/5">
        <div onclick="showPage('main')" class="text-2xl font-black text-yellow-500 cursor-pointer tracking-tighter">UPLOAD.CS2</div>
        <div class="flex items-center gap-6">
            <div class="bg-white/5 px-4 py-2 rounded-lg border border-white/10">
                <span id="nav-balance" class="font-bold text-yellow-500">0</span> <span class="text-[10px] text-gray-500">SQ</span>
            </div>
            <button onclick="showPage('profile')" id="user-name" class="hover:text-yellow-500 transition-colors uppercase text-sm font-bold">Профиль</button>
        </div>
    </nav>

    <main id="page-main" class="grid grid-cols-12 gap-6 p-8 max-w-[1600px] mx-auto">
        <section class="col-span-3 bg-white/5 rounded-3xl p-6 border border-white/5 min-h-[700px]">
            <h2 class="text-xs font-black uppercase text-gray-500 mb-4 tracking-widest">Твой инвентарь</h2>
            <input type="text" id="inv-search" placeholder="Поиск своих..." class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-yellow-500/50">
            <div id="inventory-list" class="space-y-2 overflow-y-auto max-h-[550px] custom-scroll"></div>
        </section>

        <section class="col-span-6 flex flex-col items-center justify-center relative">
            <div class="relative w-[400px] h-[400px] flex items-center justify-center">
                <svg class="w-full h-full -rotate-90">
                    <circle cx="200" cy="200" r="180" fill="none" stroke="#1a1a1a" stroke-width="12"/>
                    <circle id="progress-ring" cx="200" cy="200" r="180" fill="none" stroke="#eab308" stroke-width="12" stroke-dasharray="1130" stroke-dashoffset="1130" stroke-linecap="round" class="transition-all duration-500"/>
                </svg>
                <div class="absolute text-center">
                    <div id="chance-display" class="text-6xl font-black italic">0%</div>
                    <div class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mt-2 font-bold">Шанс успеха</div>
                </div>
            </div>
            <button id="upgrade-btn" disabled class="mt-12 bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-105 active:scale-95 disabled:opacity-20 disabled:grayscale transition-all shadow-[0_0_50px_rgba(234,179,8,0.2)]">Запустить апгрейд</button>
        </section>

        <section class="col-span-3 bg-white/5 rounded-3xl p-6 border border-white/5 min-h-[700px]">
            <h2 class="text-xs font-black uppercase text-gray-500 mb-4 tracking-widest">Выберите цель</h2>
            <input type="text" id="target-search" placeholder="Поиск по базе..." class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-yellow-500/50">
            <div id="target-list" class="space-y-2 overflow-y-auto max-h-[550px] custom-scroll"></div>
        </section>
    </main>

    <div id="page-profile" class="hidden p-12 max-w-4xl mx-auto">
        <div class="bg-gradient-to-br from-white/10 to-transparent p-10 rounded-[40px] border border-white/10">
            <div class="flex items-center gap-8 mb-10">
                <div class="w-24 h-24 bg-yellow-500 rounded-3xl flex items-center justify-center text-4xl font-black text-black">?</div>
                <div>
                    <h1 id="profile-name" class="text-4xl font-black italic mb-2 tracking-tighter">Игрок</h1>
                    <p class="text-yellow-500 font-bold text-xs uppercase tracking-widest">Статус: SQ-Аристократ</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 p-6 rounded-3xl border border-white/5">
                    <p class="text-gray-500 text-[10px] uppercase font-bold mb-1">Баланс</p>
                    <p id="profile-balance" class="text-3xl font-black text-yellow-500">0 SQ</p>
                </div>
                <div class="bg-red-500/10 p-6 rounded-3xl border border-red-500/20 cursor-pointer hover:bg-red-500/20 transition-all" onclick="firebase.auth().signOut()">
                    <p class="text-red-500 font-black uppercase text-center mt-3">Выйти из аккаунта</p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>

    <body class="bg-[#0b0b0b] text-white font-['Montserrat']">
    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
