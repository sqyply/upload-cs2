<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | ТЕСТ-РЕЖИМ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050508] text-white font-['Inter'] selection:bg-yellow-500 selection:text-black overflow-x-hidden">
    
    <nav class="flex justify-between items-center px-10 py-6 bg-[#0a0a0f] border-b border-white/5 shadow-2xl relative z-50">
        <div class="text-3xl font-black font-['Orbitron'] italic tracking-tighter">
            UPLOAD<span class="text-yellow-500">.CS2</span>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="text-right">
                <div class="text-yellow-500 font-black text-2xl flex items-center gap-2">
                    <span>1,000,000</span>
                    <span class="text-[10px] bg-yellow-500/20 px-2 py-1 rounded text-yellow-500 font-bold">SQ</span>
                </div>
                <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">ТЕСТ-АККАУНТ</div>
            </div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-yellow-500 to-yellow-700 p-[2px]">
                <div class="w-full h-full bg-[#0d0d12] rounded-[14px] flex items-center justify-center font-black text-yellow-500 text-xl">?</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 grid grid-cols-12 gap-8 pb-20">
        
        <section class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 h-[750px] flex flex-col shadow-2xl">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-8">Твой Склад (Тест)</h3>
            <div id="inventory-grid" class="grid grid-cols-1 gap-4 overflow-y-auto custom-scroll pr-2">
                </div>
        </section>

        <section class="col-span-6 flex flex-col items-center py-5">
            <div class="relative">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-1.5 h-16 bg-yellow-500 z-30 rounded-full shadow-[0_0_30px_#eab308]"></div>
                
                <canvas id="wheel" width="500" height="500" class="relative z-10 drop-shadow-[0_0_60px_rgba(0,0,0,0.8)]"></canvas>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
                    <span class="text-6xl font-black font-['Orbitron'] text-white" id="chance-display">0%</span>
                    <span class="text-[10px] text-gray-500 font-black uppercase tracking-[0.4em] mt-4">Шанс успеха</span>
                </div>
            </div>
            
            <button id="roll-btn" disabled class="mt-16 w-full max-w-lg h-24 bg-gradient-to-r from-yellow-400 via-yellow-500 to-yellow-600 text-black font-black font-['Orbitron'] text-2xl rounded-[2rem] shadow-[0_20px_50px_rgba(234,179,8,0.3)] disabled:opacity-20 flex items-center justify-center gap-4 transition-all hover:scale-[1.02] active:scale-95">
                ЗАПУСТИТЬ АПГРЕЙД
            </button>
        </section>

        <section class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 flex flex-col shadow-2xl overflow-hidden text-center justify-center">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-10">Цель</h3>
            <div id="target-area" class="opacity-10 transition-opacity duration-500">
                <img id="target-img" src="" class="w-full max-w-[200px] mx-auto drop-shadow-[0_0_30px_rgba(234,179,8,0.3)]">
                <h4 id="target-name" class="text-2xl font-black font-['Orbitron'] mt-8 uppercase tracking-tighter">---</h4>
                <p id="target-price" class="text-yellow-500 font-black text-xl italic mt-2">0 SQ</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
