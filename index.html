<body class="bg-[#0b0b0b] text-white font-['Montserrat']">
    
    <nav class="flex justify-between items-center px-10 py-5 bg-[#0f0f0f] border-b border-yellow-500/10 shadow-lg shadow-black">
        <div onclick="showPage('main')" class="text-2xl font-black text-yellow-500 cursor-pointer drop-shadow-[0_0_10px_rgba(234,179,8,0.3)]">UPLOAD.CS2</div>
        <div class="flex items-center gap-6">
            <div class="bg-black/40 px-5 py-2 rounded-xl border border-white/5 flex items-center gap-2">
                <span id="nav-balance" class="font-black text-yellow-500 text-lg">0</span>
                <span class="text-[10px] text-gray-500 font-bold uppercase">SQ</span>
            </div>
            <button onclick="showPage('profile')" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-black text-xs uppercase hover:bg-yellow-400 transition-all">Профиль</button>
        </div>
    </nav>

    <div id="page-profile" class="hidden p-8 max-w-[1200px] mx-auto animate-fade-in">
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-4 bg-[#141414] p-8 rounded-[32px] border border-white/5 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl font-black italic">VIP</div>
                <div class="flex flex-col items-center">
                    <div class="w-32 h-32 bg-yellow-500 rounded-[40px] flex items-center justify-center text-5xl font-black text-black mb-6 shadow-2xl shadow-yellow-500/20 italic">?</div>
                    <h1 class="text-3xl font-black italic tracking-tighter mb-1">ФАМА</h1>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">ID: 372958</p>
                    <button class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest text-sm hover:scale-[1.02] active:scale-95 transition-all">Пополнить</button>
                </div>
            </div>

            <div class="col-span-5 bg-[#141414] p-8 rounded-[32px] border border-white/5 flex flex-col items-center justify-center relative">
                <p class="absolute top-6 left-8 text-gray-500 text-[10px] font-bold uppercase">Best Drop</p>
                <img id="best-drop-img" src="" class="w-48 h-48 object-contain drop-shadow-[0_20px_50px_rgba(234,179,8,0.2)] mb-4">
                <h3 id="best-drop-name" class="font-black italic text-xl">Dragon Lore</h3>
                <span class="text-yellow-500 font-black text-sm">1,250,000 SQ</span>
            </div>

            <div class="col-span-3 space-y-4">
                <div class="bg-[#141414] p-6 rounded-[28px] border border-white/5">
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-2 italic">Выведено</p>
                    <p class="text-2xl font-black">0 <span class="text-xs text-yellow-500">SQ</span></p>
                </div>
                <div class="bg-[#141414] p-6 rounded-[28px] border border-white/5">
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-2 italic">Апгрейдов сделано</p>
                    <p class="text-2xl font-black text-yellow-500">171</p>
                </div>
            </div>
        </div>

        <div class="mt-8 flex gap-4 border-b border-white/5 pb-4">
            <button class="text-yellow-500 font-black border-b-2 border-yellow-500 pb-2 px-4 uppercase text-xs tracking-widest">Инвентарь</button>
            <button class="text-gray-500 font-bold px-4 uppercase text-xs tracking-widest">История</button>
        </div>
    </div>

    <div class="flex gap-2 mb-8 bg-black/40 p-1 rounded-2xl border border-white/5">
        <button onclick="setSpeed('slow')" id="speed-slow" class="speed-btn active px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Slow</button>
        <button onclick="setSpeed('fast')" id="speed-fast" class="speed-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase italic">Fast</button>
        <button onclick="setSpeed('instant')" id="speed-instant" class="speed-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase italic text-yellow-500">Instant</button>
    </div>
    <script src="test-mode.js"></script>
    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
