<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050508] text-white font-['Inter']">
    <div id="auth-modal" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-[#0d0d12] p-8 rounded-3xl border border-yellow-500/20 w-96 text-center shadow-[0_0_50px_rgba(234,179,8,0.1)]">
            <h2 class="text-2xl font-black font-['Orbitron'] mb-6 uppercase">System Access</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full bg-[#16161d] border border-white/5 p-4 rounded-xl mb-4 focus:border-yellow-500 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-[#16161d] border border-white/5 p-4 rounded-xl mb-6 focus:border-yellow-500 outline-none">
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-yellow-500 text-black font-bold py-3 rounded-xl hover:brightness-110">LOGIN</button>
                <button onclick="handleAuth('register')" class="flex-1 border border-white/10 font-bold py-3 rounded-xl hover:bg-white/5">SIGN UP</button>
            </div>
        </div>
    </div>

    <nav class="flex justify-between items-center px-8 py-4 bg-[#0a0a0f] border-b border-white/5">
        <div class="text-2xl font-black font-['Orbitron'] italic tracking-tighter">UPLOAD<span class="text-yellow-500">.CS2</span></div>
        <div id="user-bar" class="flex items-center gap-4 hidden">
            <div class="text-right">
                <div class="text-yellow-500 font-black text-lg" id="user-balance">$0.00</div>
                <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold" id="user-name">Loading...</div>
            </div>
            <button onclick="firebase.auth().signOut()" class="bg-white/5 p-2 rounded-lg hover:bg-red-500/20 transition-colors">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3h-9c-1.1 0-2 .9-2 2v4h2V5h9v14h-9v-4H9v4c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
            </button>
        </div>
        <button id="nav-auth-btn" onclick="toggleAuthModal(true)" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-bold font-['Orbitron'] text-xs">CONNECT</button>
    </nav>

    <main class="container mx-auto mt-8 px-4 grid grid-cols-12 gap-6">
        <div class="col-span-3 bg-[#0a0a0f] rounded-3xl p-6 border border-white/5 h-[700px] flex flex-col shadow-2xl">
            <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-6">Your Vault</h3>
            <div id="inventory" class="grid grid-cols-1 gap-3 overflow-y-auto custom-scroll pr-2">
                </div>
        </div>

        <div class="col-span-6 flex flex-col items-center justify-center py-10">
            <div class="relative group">
                <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-1 h-12 bg-yellow-500 z-30 rounded-full shadow-[0_0_20px_#eab308]"></div>
                <canvas id="wheel" width="480" height="480" class="relative z-10 transition-transform duration-[5s] cubic-bezier(0.15, 0, 0.15, 1)"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
                    <span class="text-5xl font-black font-['Orbitron'] text-white" id="chance-display">0%</span>
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Win Probability</span>
                </div>
            </div>
            
            <div class="flex gap-4 mt-12 w-full max-w-md">
                <div class="flex-1 bg-[#0a0a0f] p-4 rounded-2xl border border-white/5 text-center">
                    <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Potential Win</div>
                    <div class="text-xl font-black text-yellow-500" id="potential-win">$0.00</div>
                </div>
                <button id="roll-btn" disabled class="flex-[2] bg-gradient-to-b from-yellow-400 to-yellow-600 text-black font-black font-['Orbitron'] text-xl rounded-2xl shadow-xl disabled:opacity-20 uppercase">Execute</button>
            </div>
        </div>

        <div class="col-span-3 bg-[#0a0a0f] rounded-3xl p-8 border border-white/5 flex flex-col items-center justify-center text-center shadow-2xl">
            <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-10">Upgrade Target</h3>
            <div id="target-area" class="opacity-20 transition-opacity">
                <div class="relative">
                    <div class="absolute inset-0 bg-yellow-500/10 blur-[60px] rounded-full"></div>
                    <img id="target-img" src="" class="w-full relative z-10">
                </div>
                <h4 id="target-name" class="text-2xl font-black font-['Orbitron'] mt-6">---</h4>
                <p id="target-price" class="text-yellow-500 font-bold text-lg mt-2">$0.00</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
