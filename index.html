<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | HIGH ROLLER EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050508] text-white font-['Inter'] selection:bg-yellow-500 selection:text-black overflow-x-hidden">
    
    <div id="auth-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center hidden backdrop-blur-md">
        <div class="bg-[#0d0d12] p-12 rounded-[2.5rem] border border-yellow-500/20 w-[450px] text-center shadow-[0_0_80px_rgba(234,179,8,0.15)]">
            <h2 class="text-3xl font-black font-['Orbitron'] mb-10 uppercase tracking-tighter">Вход в Систему</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full bg-[#16161d] border border-white/5 p-5 rounded-2xl mb-5 focus:border-yellow-500 outline-none">
            <input type="password" id="auth-pass" placeholder="Пароль" class="w-full bg-[#16161d] border border-white/5 p-5 rounded-2xl mb-10 focus:border-yellow-500 outline-none">
            <div class="flex gap-4">
                <button onclick="handleAuth('login')" class="flex-1 bg-yellow-500 text-black font-black py-5 rounded-2xl hover:scale-105 transition-all">ВОЙТИ</button>
                <button onclick="handleAuth('register')" class="flex-1 border border-white/10 font-black py-5 rounded-2xl hover:bg-white/5 transition-all">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center hidden backdrop-blur-md">
        <div class="bg-[#0d0d12] p-12 rounded-[3rem] border border-white/5 w-[600px] shadow-2xl relative">
            <button onclick="toggleModal('profile', false)" class="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
            
            <div class="flex items-center gap-10 mb-12">
                <img id="profile-avatar-img" src="" class="w-32 h-32 rounded-[2.5rem] object-cover border-4 border-yellow-500 shadow-xl hidden">
                <div id="profile-avatar-placeholder" class="w-32 h-32 rounded-[2.5rem] bg-yellow-500 flex items-center justify-center text-6xl font-black text-black">?</div>
                <div>
                    <h2 class="text-4xl font-black font-['Orbitron'] mb-2" id="profile-name">ГЕЙБ</h2>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Статус: <span class="text-yellow-500" id="profile-status">SQ-Фармила</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div class="bg-[#11111a] p-6 rounded-2xl border border-white/5">
                    <label class="text-[9px] text-gray-500 uppercase font-bold block mb-2">Ссылка на аватар (HTTP://)</label>
                    <input type="text" id="avatar-input" placeholder="http://..." class="w-full bg-black/40 border border-white/5 p-3 rounded-xl text-xs outline-none focus:border-yellow-500">
                    <button onclick="updateAvatar()" class="w-full mt-3 py-3 bg-yellow-500 text-black text-[10px] font-black rounded-xl uppercase">Применить</button>
                </div>
                <div class="bg-[#11111a] p-6 rounded-2xl border border-white/5 flex flex-col justify-center gap-4">
                    <button onclick="addFreeSkin()" class="w-full py-4 bg-green-500/10 text-green-500 rounded-xl font-black text-xs hover:bg-green-500/20 uppercase tracking-tighter">🎁 Получить Фри Скин (Тест)</button>
                    <button onclick="firebase.auth().signOut()" class="w-full py-4 bg-red-500/10 text-red-500 rounded-xl font-black text-xs hover:bg-red-500/20 uppercase">Выход</button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-overlay" class="fixed inset-0 bg-black/90 z-[150] flex flex-col items-center justify-center hidden backdrop-blur-lg">
        <h1 id="result-title" class="text-9xl font-black font-['Orbitron'] uppercase tracking-tighter transition-all">ПОБЕДА</h1>
        <p id="result-desc" class="text-xl text-gray-400 mt-6 max-w-lg text-center">AWP | Dragon Lore зачислен в твой инвентарь.</p>
        <button onclick="toggleModal('result', false)" class="mt-12 px-12 py-4 bg-yellow-500 text-black font-black rounded-xl uppercase hover:scale-105 active:scale-95">Продолжить</button>
    </div>

    <nav class="flex justify-between items-center px-10 py-6 bg-[#0a0a0f] border-b border-white/5 shadow-2xl sticky top-0 z-[80]">
        <div class="text-3xl font-black font-['Orbitron'] italic tracking-tighter">UPLOAD<span class="text-yellow-500">.CS2</span></div>
        <div id="user-bar" class="flex items-center gap-6 hidden">
            <div class="text-right">
                <div class="text-yellow-500 font-black text-2xl flex items-center gap-2">
                    <span id="user-balance">0</span>
                    <span class="text-[10px] bg-yellow-500/20 px-2 py-1 rounded text-yellow-500 font-bold">SQ</span>
                </div>
                <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold" id="user-status-nav">---</div>
            </div>
            <div onclick="toggleModal('profile', true)" class="w-14 h-14 rounded-2xl bg-gradient-to-br from-yellow-500 to-yellow-700 p-[1px] cursor-pointer hover:scale-105 transition-all">
                <img id="nav-avatar-img" src="" class="w-full h-full object-cover rounded-[14px] hidden">
                <div id="nav-avatar-placeholder" class="w-full h-full bg-[#0d0d12] rounded-[14px] flex items-center justify-center font-black text-yellow-500 text-xl">?</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 grid grid-cols-12 gap-8 pb-20">
        <section class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 h-[800px] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Твой Склад</h3>
                <input type="text" id="filter-inv" placeholder="Поиск (SQ...)" class="bg-[#11111a] border border-white/5 p-2 rounded-lg text-xs outline-none focus:border-yellow-500 w-32">
            </div>
            <div id="inventory" class="grid grid-cols-1 gap-4 overflow-y-auto custom-scroll pr-2">
                </div>
        </section>

        <section class="col-span-6 flex flex-col items-center py-5 relative">
            <div class="flex bg-[#0a0a0f] p-1.5 rounded-2xl border border-white/5 absolute -top-5 z-40">
                <button onclick="setSpeed('slow')" class="speed-btn active" id="speed-slow">SLOW-MO</button>
                <button onclick="setSpeed('fast')" class="speed-btn" id="speed-fast">TURBO</button>
                <button onclick="setSpeed('instant')" class="speed-btn" id="speed-instant">INSTANT</button>
            </div>

            <div class="relative w-[500px] h-[500px] mt-10">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-1.5 h-16 bg-yellow-500 z-30 rounded-full shadow-[0_0_30px_#eab308]"></div>
                <canvas id="wheel" width="500" height="500" class="relative z-10 transition-transform duration-[5s] cubic-bezier(0.15, 0, 0.15, 1)"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
                    <span class="text-6xl font-black font-['Orbitron'] text-white" id="chance-display">0%</span>
                    <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest mt-4">Шанс успеха</span>
                </div>
            </div>
            
            <button id="roll-btn" disabled class="mt-16 w-full max-w-lg h-24 bg-gradient-to-r from-yellow-400 via-yellow-500 to-yellow-600 text-black font-black font-['Orbitron'] text-3xl rounded-[2rem] shadow-[0_20px_50px_rgba(234,179,8,0.3)] disabled:opacity-20 flex items-center justify-center transition-all hover:scale-[1.02] active:scale-95 uppercase">ЗАПУСТИТЬ</button>
        </section>

        <section class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 h-[800px] flex flex-col shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Выбери цель</h3>
                <input type="text" id="filter-target" placeholder="Поиск (SQ...)" class="bg-[#11111a] border border-white/5 p-2 rounded-lg text-xs outline-none focus:border-yellow-500 w-32">
            </div>
            <div id="target-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
