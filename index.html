<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | Upgrader Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#080808] text-white font-['Montserrat'] overflow-x-hidden">

    <div class="h-20 bg-[#0c0c0c] border-b border-white/5 flex items-center relative overflow-hidden">
        <div class="absolute left-0 z-20 bg-yellow-500 text-black px-4 py-7 font-black italic text-xs shadow-[10px_0_30px_rgba(234,179,8,0.2)]">LIVE</div>
        <div id="live-drop-container" class="flex gap-3 ml-20 animate-scroll">
            </div>
    </div>

    <nav class="flex justify-between items-center px-10 py-5 bg-[#0a0a0a] border-b border-white/5">
        <div onclick="showPage('main')" class="text-3xl font-black italic text-yellow-500 cursor-pointer tracking-tighter hover:scale-105 transition-transform">UPLOAD.CS2</div>
        
        <div class="flex items-center gap-8">
            <div class="flex flex-col items-end">
                <span id="nav-balance" class="text-xl font-black text-yellow-500 italic">0.00 SQ</span>
                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Ваш баланс</span>
            </div>
            <div onclick="showPage('profile')" class="flex items-center gap-4 bg-white/5 p-2 pr-6 rounded-2xl border border-white/5 cursor-pointer hover:bg-white/10 transition-all">
                <div class="w-12 h-12 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-black text-xl italic shadow-lg shadow-yellow-500/20">?</div>
                <div>
                    <div id="nav-username" class="font-black text-sm uppercase italic">ФАМА</div>
                    <div class="text-[10px] text-yellow-500 font-bold uppercase">Level <span id="nav-level">1</span></div>
                </div>
            </div>
        </div>
    </nav>

    <main id="page-main" class="p-8 grid grid-cols-12 gap-8 max-w-[1700px] mx-auto min-h-[85vh]">
        
        <section class="col-span-3 bg-[#0d0d0d] rounded-[40px] p-6 border border-white/5 relative overflow-hidden flex flex-col shadow-inner">
            <div class="awp-silhouette left-[-30%] opacity-[0.03]"></div>
            <h2 class="text-xs font-black uppercase text-gray-500 mb-6 italic tracking-[0.2em] relative z-10">Твой инвентарь</h2>
            <div id="inventory-list" class="flex-1 space-y-3 overflow-y-auto custom-scroll relative z-10 pr-2"></div>
        </section>

        <section class="col-span-6 flex flex-col items-center justify-center relative">
            <div class="flex gap-2 mb-10 bg-black/50 p-1.5 rounded-2xl border border-white/10">
                <button onclick="setSpeed('slow')" id="speed-slow" class="speed-btn active">Slow</button>
                <button onclick="setSpeed('fast')" id="speed-fast" class="speed-btn">Fast</button>
                <button onclick="setSpeed('instant')" id="speed-instant" class="speed-btn !text-yellow-500">Instant</button>
            </div>

            <div class="relative w-[450px] h-[450px] flex items-center justify-center">
                <svg class="w-full h-full -rotate-90">
                    <circle cx="225" cy="225" r="210" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="16"/>
                    <circle id="progress-ring" cx="225" cy="225" r="210" fill="none" stroke="#eab308" stroke-width="16" 
                            stroke-dasharray="1319" stroke-dashoffset="1319" stroke-linecap="round" 
                            class="transition-all duration-[2000ms] ease-out shadow-glow"/>
                </svg>
                <div class="absolute text-center">
                    <div id="chance-display" class="text-[80px] font-black italic italic leading-none">0%</div>
                    <div class="text-xs text-gray-500 font-bold uppercase tracking-[0.4em] mt-4 opacity-50 italic">Chance of success</div>
                </div>
            </div>

            <div class="flex gap-3 mt-12 mb-10">
                <button onclick="setChancePreset(1)" class="chance-btn">1.5x</button>
                <button onclick="setChancePreset(15)" class="chance-btn">2x</button>
                <button onclick="setChancePreset(35)" class="chance-btn">5x</button>
                <button onclick="setChancePreset(50)" class="chance-btn">10x</button>
                <button onclick="setChancePreset(75)" class="chance-btn">50x</button>
            </div>

            <button id="upgrade-btn" disabled class="main-upgrade-btn">Select items</button>
        </section>

        <section class="col-span-3 bg-[#0d0d0d] rounded-[40px] p-6 border border-white/5 relative overflow-hidden flex flex-col shadow-inner">
            <div class="awp-silhouette right-[-30%] scale-x-[-1] opacity-[0.03]"></div>
            <h2 class="text-xs font-black uppercase text-gray-500 mb-6 italic tracking-[0.2em] relative z-10">Target Item</h2>
            <div id="target-list" class="flex-1 space-y-3 overflow-y-auto custom-scroll relative z-10 pr-2"></div>
        </section>
    </main>

    <div id="page-profile" class="hidden p-12 max-w-[1300px] mx-auto animate-fade-in">
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-4 bg-[#111] p-10 rounded-[50px] border border-white/5 relative overflow-hidden text-center">
                <div class="absolute -top-4 -right-4 text-8xl font-black italic opacity-[0.03]">USER</div>
                <div class="w-36 h-36 bg-yellow-500 rounded-[45px] mx-auto mb-8 flex items-center justify-center text-6xl font-black text-black italic shadow-[0_20px_50px_rgba(234,179,8,0.3)]">?</div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter mb-4">ФАМА</h1>
                
                <div class="w-full bg-white/5 h-4 rounded-full mt-10 mb-3 border border-white/5 p-1">
                    <div id="xp-bar" class="bg-yellow-500 h-full rounded-full shadow-[0_0_20px_rgba(234,179,8,0.4)] transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Level <span id="prof-level" class="text-yellow-500">1</span> — <span id="prof-xp">0</span> / 1000 XP</p>
                
                <button class="w-full mt-10 bg-yellow-500 text-black py-5 rounded-[25px] font-black uppercase italic tracking-widest hover:scale-[1.02] transition-all">Deposit Balance</button>
            </div>

            <div class="col-span-5 bg-[#111] p-10 rounded-[50px] border border-white/5 flex flex-col items-center justify-center relative">
                <p class="absolute top-8 left-10 text-gray-600 text-[10px] font-black uppercase italic tracking-widest">Personal Best Drop</p>
                <img id="best-drop-img" src="" class="w-64 h-64 object-contain drop-shadow-[0_40px_80px_rgba(234,179,8,0.25)]">
                <h3 id="best-drop-name" class="font-black italic text-2xl uppercase mt-6 tracking-tighter">None</h3>
                <span id="best-drop-price" class="text-yellow-500 font-black text-lg italic mt-1">0.00 SQ</span>
            </div>

            <div class="col-span-3 space-y-6">
                <div class="bg-[#111] p-10 rounded-[40px] border border-white/5 text-center">
                    <p class="text-gray-500 text-[10px] font-black uppercase italic mb-2 tracking-widest">Total Upgrades</p>
                    <p id="stat-total" class="text-5xl font-black text-yellow-500 italic">0</p>
                </div>
                <div onclick="location.reload()" class="bg-red-500/5 p-10 rounded-[40px] border border-red-500/10 text-center cursor-pointer hover:bg-red-500/10 transition-all">
                    <p class="text-red-500 font-black uppercase text-xs italic tracking-widest">Logout Account</p>
                </div>
            </div>
        </div>
    </div>

    <script src="test-mode.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
