<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGRADER | CS2 Skins Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#0b0b0d] text-[#e1e1e1] font-['Exo_2'] select-none overflow-hidden">

    <header class="h-[70px] bg-[#121214] border-b border-white/[0.03] flex items-center justify-between px-6 z-50 relative">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2 cursor-pointer group">
                <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center rotate-45 group-hover:rotate-90 transition-transform duration-500">
                    <div class="-rotate-45 group-hover:-rotate-90 transition-transform duration-500">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="black"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                    </div>
                </div>
                <span class="text-2xl font-[900] tracking-tighter uppercase italic">UPGRADER</span>
            </div>
            
            <nav class="flex gap-6 text-sm font-bold text-gray-500 uppercase tracking-widest">
                <a href="#" class="hover:text-white transition-colors">Events</a>
                <a href="#" class="text-white border-b-2 border-yellow-500 pb-1">Upgrade</a>
                <a href="#" class="hover:text-white transition-colors">Case Battles</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="bg-[#1a1a1d] px-4 py-2 rounded-xl border border-white/[0.05] flex items-center gap-3">
                <span id="user-balance" class="font-black text-yellow-500 italic text-lg">0.20</span>
                <div class="w-5 h-5 bg-yellow-500 rounded-full flex items-center justify-center text-[10px] text-black font-bold">SQ</div>
                <button class="ml-2 bg-yellow-500 text-black px-3 py-1 rounded-lg text-[10px] font-black uppercase hover:bg-yellow-400">Top Up</button>
            </div>
            
            <div onclick="toggleProfile()" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                <div class="text-right">
                    <div class="text-xs font-black uppercase italic" id="display-name">Loading...</div>
                    <div class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">ID 372958</div>
                </div>
                <div id="user-avatar" class="w-10 h-10 bg-[#252528] rounded-xl border border-white/10 overflow-hidden flex items-center justify-center text-xl font-bold italic text-yellow-500">?</div>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-70px)]">
        
        <aside class="w-[100px] bg-[#0e0e10] border-r border-white/[0.03] flex flex-col items-center py-4 gap-3 overflow-y-auto custom-scroll no-scrollbar">
            <div id="live-history" class="space-y-3"></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto no-scrollbar relative bg-[radial-gradient(circle_at_50%_-20%,_rgba(234,179,8,0.05)_0%,_transparent_50%)]">
            
            <section class="min-h-[500px] w-full flex items-center justify-around px-20 py-10 relative">
                
                <div class="w-[320px] h-[320px] bg-[#121214]/80 rounded-[40px] border border-white/[0.05] flex flex-col items-center justify-center p-6 relative overflow-hidden group">
                    <div id="selected-my-container" class="z-10 flex flex-col items-center">
                        <div class="w-40 h-40 opacity-20 group-hover:opacity-40 transition-opacity">
                            <svg viewBox="0 0 24 24" fill="currentColor" class="text-yellow-500"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mt-4">Select skins to use</p>
                    </div>
                    <div id="selected-my-item" class="hidden z-10 flex flex-col items-center">
                        <img id="my-item-img" src="" class="w-48 h-32 object-contain drop-shadow-[0_20px_30px_rgba(0,0,0,0.5)]">
                        <div class="text-center mt-4">
                            <div id="my-item-name" class="text-[11px] font-bold uppercase text-gray-400 truncate w-40"></div>
                            <div id="my-item-price" class="text-yellow-500 font-black italic text-lg mt-1"></div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center gap-8">
                    <div class="relative w-[360px] h-[360px] flex items-center justify-center">
                        <svg class="absolute inset-0 w-full h-full -rotate-90">
                            <circle cx="180" cy="180" r="165" fill="none" stroke="#1a1a1d" stroke-width="25" />
                            <circle id="ring-progress" cx="180" cy="180" r="165" fill="none" stroke="url(#grad)" stroke-width="25" 
                                    stroke-dasharray="1036" stroke-dashoffset="1036" stroke-linecap="round" class="transition-all duration-700 ease-out" />
                            <defs>
                                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#eab308;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                        </svg>
                        
                        <div class="text-center z-10">
                            <div id="chance-text" class="text-[72px] font-black italic italic leading-none text-white tracking-tighter">0.00%</div>
                            <div class="text-[10px] text-gray-500 font-black uppercase tracking-[0.4em] mt-2 opacity-50">Medium Chance</div>
                        </div>

                        <div id="ticker" class="absolute top-[15px] w-2 h-10 bg-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.8)] rounded-full transition-all duration-[3000ms] hidden" style="transform-origin: 50% 165px;"></div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="setSpeed('slow')" class="speed-btn active">Slow</button>
                        <button onclick="setSpeed('fast')" class="speed-btn">Turbo</button>
                        <button onclick="setSpeed('instant')" class="speed-btn">Instant</button>
                    </div>

                    <button id="btn-execute" disabled class="upgrade-execute-btn">Upgrade</button>
                </div>

                <div class="w-[320px] h-[320px] bg-[#121214]/80 rounded-[40px] border border-white/[0.05] flex flex-col items-center justify-center p-6 relative overflow-hidden group">
                    <div id="selected-target-container" class="z-10 flex flex-col items-center">
                        <div class="w-40 h-40 opacity-20 group-hover:opacity-40 transition-opacity rotate-180">
                            <svg viewBox="0 0 24 24" fill="currentColor" class="text-yellow-500"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                        </div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mt-4">Select skin for upgrade</p>
                    </div>
                    <div id="selected-target-item" class="hidden z-10 flex flex-col items-center">
                        <img id="target-item-img" src="" class="w-48 h-32 object-contain drop-shadow-[0_20px_30px_rgba(0,0,0,0.5)]">
                        <div class="text-center mt-4">
                            <div id="target-item-name" class="text-[11px] font-bold uppercase text-gray-400 truncate w-40"></div>
                            <div id="target-item-price" class="text-yellow-500 font-black italic text-lg mt-1"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="p-8 bg-[#0e0e10]/50 rounded-t-[50px] border-t border-white/[0.03] flex-1">
                <div class="max-w-7xl mx-auto grid grid-cols-2 gap-10">
                    
                    <div>
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest italic flex items-center gap-2">
                                <span class="w-2 h-2 bg-yellow-500 rounded-full"></span> My Skins
                            </h3>
                            <input type="text" placeholder="Search..." class="bg-[#1a1a1d] border border-white/5 rounded-lg px-4 py-2 text-[10px] focus:outline-none focus:border-yellow-500/50 w-32">
                        </div>
                        <div id="grid-my" class="grid grid-cols-4 gap-3 h-[400px] overflow-y-auto pr-2 custom-scroll">
                            </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xs font-black uppercase text-gray-500 tracking-widest italic flex items-center gap-2">
                                <span class="w-2 h-2 bg-yellow-500 rounded-full"></span> Select Target
                            </h3>
                            <div class="flex gap-2">
                                <input type="number" placeholder="From" class="bg-[#1a1a1d] border border-white/5 rounded-lg px-3 py-2 text-[10px] w-20">
                                <input type="number" placeholder="To" class="bg-[#1a1a1d] border border-white/5 rounded-lg px-3 py-2 text-[10px] w-20">
                            </div>
                        </div>
                        <div id="grid-shop" class="grid grid-cols-4 gap-3 h-[400px] overflow-y-auto pr-2 custom-scroll">
                            </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <div id="result-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-10">
        <div class="text-center">
            <h2 id="result-title" class="text-[120px] font-black italic italic leading-none mb-4">WIN</h2>
            <div id="result-skin-box" class="bg-[#121214] p-10 rounded-[60px] border border-white/10 mb-8 inline-block shadow-2xl">
                <img id="result-img" src="" class="w-72 h-48 object-contain">
                <h4 id="result-name" class="text-xl font-black italic uppercase mt-4"></h4>
            </div>
            <br>
            <button onclick="closeModal()" class="bg-yellow-500 text-black px-12 py-5 rounded-3xl font-black uppercase italic tracking-widest hover:scale-110 transition-transform">Collect Item</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
