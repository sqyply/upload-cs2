<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD.CS2 | SQ-COINS EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050508] text-white font-['Inter']">
    
    <div id="auth-modal" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center hidden backdrop-blur-md">
        <div class="bg-[#0d0d12] p-10 rounded-[2.5rem] border border-yellow-500/30 w-[400px] text-center shadow-[0_0_80px_rgba(234,179,8,0.15)]">
            <h2 class="text-3xl font-black font-['Orbitron'] mb-8 uppercase tracking-tighter">Вход в Систему</h2>
            <input type="email" id="auth-email" placeholder="Электронная почта" class="w-full bg-[#16161d] border border-white/5 p-5 rounded-2xl mb-4 focus:border-yellow-500 outline-none transition-all">
            <input type="password" id="auth-pass" placeholder="Пароль" class="w-full bg-[#16161d] border border-white/5 p-5 rounded-2xl mb-8 focus:border-yellow-500 outline-none transition-all">
            <div class="flex gap-3">
                <button onclick="handleAuth('login')" class="flex-1 bg-yellow-500 text-black font-black py-4 rounded-2xl hover:scale-105 active:scale-95 transition-all">ВОЙТИ</button>
                <button onclick="handleAuth('register')" class="flex-1 border border-white/10 font-black py-4 rounded-2xl hover:bg-white/5 transition-all">СОЗДАТЬ</button>
            </div>
        </div>
    </div>

    <nav class="flex justify-between items-center px-10 py-6 bg-[#0a0a0f] border-b border-white/5 shadow-2xl">
        <div class="flex items-center gap-10">
            <div class="text-3xl font-black font-['Orbitron'] italic tracking-tighter">UPLOAD<span class="text-yellow-500">.CS2</span></div>
            <div class="flex gap-6 text-sm font-bold text-gray-500 uppercase tracking-widest">
                <button onclick="switchTab('upgrade')" class="hover:text-yellow-500 transition-colors nav-link active" id="link-upgrade">Апгрейд</button>
                <button onclick="switchTab('profile')" class="hover:text-yellow-500 transition-colors nav-link" id="link-profile">Профиль и Настройки</button>
            </div>
        </div>
        
        <div id="user-bar" class="flex items-center gap-6 hidden">
            <div class="text-right">
                <div class="text-yellow-500 font-black text-2xl flex items-center gap-2">
                    <span id="user-balance">0</span>
                    <span class="text-[10px] bg-yellow-500/20 px-2 py-1 rounded text-yellow-500">SQ</span>
                </div>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-yellow-500 to-yellow-700 p-[1px]">
                <div class="w-full h-full bg-[#0d0d12] rounded-2xl flex items-center justify-center font-black text-yellow-500" id="user-avatar-initial">?</div>
            </div>
        </div>
    </nav>

    <main id="tab-upgrade" class="container mx-auto mt-10 px-4 grid grid-cols-12 gap-8">
        <div class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 h-[750px] flex flex-col">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-8">Твой Инвентарь</h3>
            <div id="inventory" class="grid grid-cols-1 gap-4 overflow-y-auto custom-scroll pr-2">
                </div>
        </div>

        <div class="col-span-6 flex flex-col items-center py-5">
            <div class="relative">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-1.5 h-16 bg-yellow-500 z-30 rounded-full shadow-[0_0_30px_#eab308]"></div>
                <canvas id="wheel" width="500" height="500" class="relative z-10"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
                    <span class="text-6xl font-black font-['Orbitron'] text-white" id="chance-display">0%</span>
                    <span class="text-[10px] text-gray-500 font-black uppercase tracking-[0.4em] mt-4">Шанс успеха</span>
                </div>
            </div>
            
            <button id="roll-btn" disabled class="mt-16 w-full max-w-lg h-24 bg-gradient-to-r from-yellow-400 via-yellow-500 to-yellow-600 text-black font-black font-['Orbitron'] text-2xl rounded-[2rem] shadow-[0_20px_50px_rgba(234,179,8,0.3)] disabled:opacity-20 flex items-center justify-center gap-4 group transition-all active:scale-95">
                <span>ЗАПУСТИТЬ АПГРЕЙД</span>
                <svg class="w-8 h-8 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>

        <div class="col-span-3 bg-[#0a0a0f] rounded-[2rem] p-8 border border-white/5 flex flex-col shadow-2xl overflow-hidden">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-8 text-center">Выбери цель</h3>
            <div id="target-list" class="flex-1 overflow-y-auto custom-scroll space-y-4 pr-2">
                </div>
        </div>
    </main>

    <main id="tab-profile" class="container mx-auto mt-10 px-4 hidden">
        <div class="max-w-4xl mx-auto bg-[#0a0a0f] rounded-[3rem] p-12 border border-white/5">
            <div class="flex items-center gap-10 mb-12">
                <div class="w-32 h-32 rounded-[2.5rem] bg-yellow-500 flex items-center justify-center text-5xl font-black text-black shadow-[0_0_40px_rgba(234,179,8,0.2)]" id="profile-avatar">?</div>
                <div>
                    <h2 class="text-4xl font-black font-['Orbitron'] mb-2" id="profile-name">Игрок</h2>
                    <p class="text-gray-500 font-bold uppercase tracking-widest text-sm">Статус: <span class="text-yellow-500">SQ-Аристократ</span></p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-[#11111a] p-8 rounded-3xl border border-white/5">
                    <h4 class="text-xs font-black text-gray-500 uppercase mb-4 tracking-widest">Баланс</h4>
                    <div class="text-4xl font-black text-white"><span id="profile-balance">0</span> SQ</div>
                    <button class="mt-6 w-full py-4 bg-white/5 rounded-2xl font-bold hover:bg-white/10 transition-all">ПОПОЛНИТЬ КОИНЫ</button>
                </div>
                <div class="bg-[#11111a] p-8 rounded-3xl border border-white/5">
                    <h4 class="text-xs font-black text-gray-500 uppercase mb-4 tracking-widest">Безопасность</h4>
                    <button onclick="firebase.auth().signOut()" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-bold hover:bg-red-500/20 transition-all uppercase">Выйти из аккаунта</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
